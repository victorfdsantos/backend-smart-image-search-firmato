# ============================================================
# LOCAL DEVELOPMENT — runs all services including AI
# Usage:
#   cp .env.local.example .env
#   docker compose up -d
#
# To run WITHOUT the AI service locally (use Azure VM AI instead):
#   docker compose --profile no-ai up -d
#   (then set AI_SERVICE_URL in .env to your VM address)
# ============================================================

services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: firmato-backend:latest
    container_name: firmato-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - clip_cache:/app/.cache/huggingface
    tmpfs:
      - /app/src/tmp_images:size=512m,uid=1000,gid=1000
      - /app/src/tmp_uploads:size=256m,uid=1000,gid=1000
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── AI Service (local GPU / CPU) ────────────────────────────────────────────
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: firmato-ai:latest
    container_name: firmato-ai
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - ./ai/src/config.ini:/app/src/config.ini:ro
      - clip_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: firmato-frontend:latest
    container_name: firmato-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - API_BASE=http://firmato-api:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: firmato-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/firmato.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - firmato-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  clip_cache:
    driver: local

networks:
  firmato-net:
    name: firmato-net
    driver: bridge