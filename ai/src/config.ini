[nas]
# Pasta raiz do NAS — imagens ficam em output/ de forma recursiva
base_path = ./nas/output
# Pasta com os JSONs de metadados por produto
data_path = ./nas/data

[embeddings]
# Pasta onde serão salvos/lidos os índices
output_path = ./nas/embeddings

[models]
# Modelo CLIP (deve ser o mesmo usado no indexer original)
clip_model_name = openai/clip-vit-large-patch14
# Modelo Sentence-Transformers
st_model_name = sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
# cpu ou cuda
device = cuda

[logs]
path = ./nas/logs